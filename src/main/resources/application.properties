spring.application.name=AI-Mechanic


server.port=${PORT:8080}


# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=${DATASOURCE_PASS:}

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Gemini Configuration
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.model=gemini-2.5-flash

# JWT Configuration
jwt.secret=${JWT_SECRET:}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Mail Configuration (Brevo SMTP Relay)
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000


# Debug logging for resolved mail config at startup
app.debug.log-mail-password-plain=${LOG_MAIL_PASSWORD_PLAIN:false}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

brevo.api.key=${BREVO_API_KEY:}
brevo.sms.sender=${BREVO_SMS_SENDER:LENDWISE}

brevo.email.sender=${BREVO_EMAIL_SENDER:}
brevo.email.sender-name=${BREVO_EMAIL_SENDER_NAME:AI Mechanic}
brevo.email.url=${BREVO_EMAIL_URL:https://api.brevo.com/v3/smtp/email}
brevo.email.smtp-fallback=${BREVO_EMAIL_SMTP_FALLBACK:true}

# Public application URL used in email verification links
app.base-url=${APP_BASE_URL:https://ai-mechanic-production.up.railway.app}

