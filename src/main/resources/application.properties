spring.application.name=AI-Mechanic


server.port=${PORT:8080}


# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=${DATASOURCE_PASS:}

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Gemini Configuration
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.model=gemini-2.5-flash

# JWT Configuration
jwt.secret=${JWT_SECRET:}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Mail Configuration (AWS SES SMTP)
spring.mail.host=${AWS_SES_SMTP_HOST:${SPRING_MAIL_HOST:}}
spring.mail.port=${AWS_SES_SMTP_PORT:${SPRING_MAIL_PORT:587}}
spring.mail.username=${AWS_SES_SMTP_USERNAME:${SPRING_MAIL_USERNAME:}}
spring.mail.password=${AWS_SES_SMTP_PASSWORD:${SPRING_MAIL_PASSWORD:}}
spring.mail.protocol=smtp

spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000


# Debug logging for resolved mail config at startup
app.debug.log-mail-password-plain=${LOG_MAIL_PASSWORD_PLAIN:false}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

mail.from.email=${MAIL_FROM_EMAIL:}
mail.from.name=${MAIL_FROM_NAME:AI Mechanic}

# Public application URL used in email verification links
app.base-url=${APP_BASE_URL:https://ai-mechanic-production.up.railway.app}

